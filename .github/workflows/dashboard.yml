name: Dashboard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ods/extensions/services/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "20"

      - name: Install Dependencies (strict lock file check)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ods/extensions/services/dashboard-api
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6
        with:
          python-version: "3.11"

      - name: API Syntax Check
        run: python -m py_compile main.py agent_monitor.py

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run Unit Tests
        run: pytest tests/ -v --cov=. --cov-report=term --cov-report=lcov:coverage.lcov
