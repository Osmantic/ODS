name: Service Tests

# Unit tests for the bundled Python services that ship their own pytest
# suite. dashboard-api is covered by the Dashboard workflow; every other
# service suite had no runner at all, so a regression in them could not
# fail a pull request.

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  pytest:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ape
          - model-router
          - privacy-shield
          - token-spy
    defaults:
      run:
        working-directory: ods/extensions/services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run Unit Tests
        run: pytest tests/ -v
