schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: token-spy
  name: Token Spy (Usage Monitor)
  aliases: []
  container_name: dream-token-spy
  default_host: token-spy
  port: 8080
  external_port_env: TOKEN_SPY_PORT
  external_port_default: 3005
  health: /health
  ui_path: /dashboard
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: recommended
  depends_on: []

proxy:
  subdomain: tokens
  exposure: user
  # /api/* and /v1/* are gated by TOKEN_SPY_API_KEY, but the /dashboard
  # HTML route is open — a LAN visitor would see the dashboard chrome
  # (and any data the JS already fetched server-side). Wrap the whole
  # subdomain in dream-session to keep the UI out of strangers' hands.
  auth: dream-session
