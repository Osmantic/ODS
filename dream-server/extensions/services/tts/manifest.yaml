schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: tts
  name: Kokoro (TTS)
  aliases: [kokoro]
  container_name: dream-tts
  host_env: KOKORO_HOST
  default_host: tts
  port: 8880
  external_port_env: TTS_PORT
  external_port_default: 8880
  health: /health
  ui_path: /docs
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []

proxy:
  subdomain: tts
  # Raw TTS API, no auth — opt-in only.
  exposure: developer-api
  auth: none
