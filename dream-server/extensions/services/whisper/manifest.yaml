schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: whisper
  name: Whisper (STT)
  aliases: [stt, voice]
  container_name: dream-whisper
  host_env: WHISPER_HOST
  default_host: whisper
  port: 8000
  external_port_env: WHISPER_PORT
  external_port_default: 9000
  health: /health
  ui_path: /
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []

proxy:
  subdomain: stt
  # Raw STT API, no auth — opt-in only.
  exposure: developer-api
  auth: none
  # Audio uploads can be large; default Caddy limit is 10MB which trips on
  # longer recordings. 100MB covers ~30 minutes of 16kHz mono WAV.
  client_max_body: 100MB

features:
  - id: voice
    name: Voice Assistant
    description: Talk to your AI with your voice
    icon: Mic
    category: voice
    requirements:
      services: [whisper, tts]
      vram_gb: 6
    enabled_services_all: [whisper, tts]
    setup_time: ~5 minutes
    priority: 2
    launch:
      type: service
      service: open-webui
    gpu_backends: [all]
