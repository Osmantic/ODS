services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.81.3-stable
    container_name: dream-litellm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - CLOUD_LLM_BASE_URL=${CLOUD_LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - CLOUD_LLM_API_KEY=${CLOUD_LLM_API_KEY:-sk-local}
      - CLOUD_LLM_MODEL=${CLOUD_LLM_MODEL:-qwen3.5-9b}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
    volumes:
      - ./config/litellm/${DREAM_MODE:-local}.yaml:/app/config.yaml:ro,z
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${LITELLM_PORT:-4000}:4000"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python3 -c 'import os, yaml; cfg = yaml.safe_load(os.path.expandvars(open("/app/config.yaml").read())); os.environ.get("LANGFUSE_ENABLED") == "true" and cfg.setdefault("litellm_settings", {}).__setitem__("success_callback", ["langfuse"]); yaml.safe_dump(cfg, open("/tmp/config.yaml", "w"), default_flow_style=False)'
        exec litellm --config /tmp/config.yaml --port 4000
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
