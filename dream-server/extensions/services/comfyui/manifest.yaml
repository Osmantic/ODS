schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: comfyui
  name: ComfyUI (Image Generation)
  aliases: []
  container_name: dream-comfyui
  default_host: comfyui
  port: 8188
  external_port_env: COMFYUI_PORT
  external_port_default: 8188
  health: /
  ui_path: /
  health_timeout: 30  # ComfyUI can be slow to start, especially on Tier 0/1 hardware
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []

proxy:
  subdomain: comfy
  exposure: user
  # ComfyUI ships with no built-in auth — gate the route via the shared
  # dream-session cookie so a LAN drive-by can't run image gen, browse
  # outputs, or install custom nodes (which execute arbitrary Python).
  auth: dream-session
  # Workflow JSON + reference image uploads can be tens of megabytes; bump
  # the limit so ComfyUI's drag-drop import doesn't 413 at the proxy.
  client_max_body: 200MB

features:
  - id: images
    name: Image Generation
    description: Generate images with FLUX.1 via ComfyUI
    icon: Image
    category: creative
    requirements:
      services: [comfyui]
      vram_gb: 0
    enabled_services_all: [comfyui]
    setup_time: Ready
    priority: 5
    launch:
      type: service
      service: comfyui
    gpu_backends: [amd, nvidia]
