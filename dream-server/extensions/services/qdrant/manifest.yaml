schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: qdrant
  name: Qdrant (Vector DB)
  aliases: [vector]
  container_name: dream-qdrant
  host_env: QDRANT_HOST
  default_host: qdrant
  port: 6333
  external_port_env: QDRANT_PORT
  external_port_default: 6333
  health: /
  ui_path: /dashboard
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []

proxy:
  # HTTP API only (port 6333). The gRPC surface on 6334 needs h2c proxying
  # and stays on its own host port — out of scope for this entry.
  subdomain: qdrant
  # Vector DB REST + dashboard with no built-in auth. Developer opt-in only.
  exposure: developer-api
  auth: none
