schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: perplexica
  name: Perplexica (Deep Research)
  aliases: []
  container_name: dream-perplexica
  host_env: PERPLEXICA_HOST
  default_host: perplexica
  port: 3000
  external_port_env: PERPLEXICA_PORT
  external_port_default: 3004
  health: /
  ui_path: /
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: [searxng, llama-server]

proxy:
  subdomain: perplexica
  exposure: user
  # Perplexica's web UI is unauthenticated — only the upstream LLM call
  # carries LITELLM_KEY. Gate via dream-session so a LAN drive-by can't
  # burn through your LLM tokens via web search.
  auth: dream-session
