schema_version: dream.services.v1

service:
  id: minio
  name: MinIO
  aliases: [s3, object-storage]
  container_name: dream-minio
  host_env: MINIO_HOST
  default_host: minio
  port: 9000
  external_port_env: MINIO_PORT
  external_port_default: 9000
  health: /minio/health/live
  ui_path: /
  type: docker
  gpu_backends: [none]
  category: optional
  compose_file: compose.yaml
  depends_on: []
  description: |
    High-performance, S3-compatible object storage server.
    Store and retrieve files, datasets, model weights, and backups via the S3 API.
    Includes a built-in web console on port 9001 for browsing and managing buckets.
  env_vars:
    - key: MINIO_ROOT_USER
      required: true
      secret: false
      description: "Root (admin) username for MinIO"
      default: "minioadmin"
    - key: MINIO_ROOT_PASSWORD
      required: true
      secret: true
      description: "Root (admin) password for MinIO (auto-generated by setup)"

features:
  - id: minio-object-storage
    name: S3-Compatible Object Storage
    description: Store and retrieve files via the S3 API with a built-in web console
    icon: Database
    category: storage
    requirements:
      services: [minio]
      vram_gb: 0
    enabled_services_all: [minio]
    setup_time: ~1 minute
    priority: 8
    launch:
      type: service
      service: minio
      path: /

tags:
  - storage
  - s3
  - object-storage
  - files
  - datasets
  - backup
