# Dream Server — NVIDIA Jetson Overlay
# Jetson uses NVIDIA's container runtime on arm64/Tegra with unified memory.
# Use with: docker compose -f docker-compose.base.yml -f docker-compose.jetson.yml up -d

services:
  llama-server:
    image: ${LLAMA_SERVER_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda-b9014}
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        limits:
          cpus: '${LLAMA_CPU_LIMIT:-6.0}'
          memory: ${LLAMA_SERVER_MEMORY_LIMIT:-6G}

  dashboard-api:
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    deploy:
      resources:
        limits:
          memory: ${DASHBOARD_API_MEMORY_LIMIT:-512M}

  open-webui:
    environment:
      ENABLE_IMAGE_GENERATION: "${ENABLE_IMAGE_GENERATION:-false}"
