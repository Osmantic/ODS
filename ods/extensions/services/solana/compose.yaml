services:
  solana:
    build:
      context: .
      dockerfile: Dockerfile
    image: ods-solana:local
    container_name: ods-solana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - SOLANA_ALLOW_MAINNET=${SOLANA_ALLOW_MAINNET:-false}
      - SOLANA_API_KEY=${SOLANA_API_KEY:-}
      - SOLANA_MCP_WRITE=${SOLANA_MCP_WRITE:-false}
      - SOLANA_PORT_INTERNAL=8590
      - SOLANA_KEYSTORE_DIR=/keystore
    volumes:
      - ods-solana-keystore:/keystore
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${SOLANA_PORT:-8590}:8590"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8590/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ods-solana-keystore:
